name: dbt CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: revanth
          POSTGRES_PASSWORD: password
          POSTGRES_DB: analytics_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install dbt-postgres great-expectations psycopg2-binary pandas sqlalchemy pyspark pytest
          pip install -e .

      - name: Debug module path
        run: |
          echo "PYTHONPATH: $PYTHONPATH"
          echo "Working dir: $(pwd)"
          ls -la
          python -c "import spark_jobs.ingest_raw; print('spark_jobs import OK')"

      - name: Run pytest
        run: pytest

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'PROFILE'
          loan_dw:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: revanth
                password: password
                dbname: analytics_dev
                schema: public
                threads: 4
          PROFILE

      - name: Create schemas and seed data
        run: |
          PGPASSWORD=password psql -h localhost -U revanth -d analytics_dev << 'SQL'
          CREATE SCHEMA IF NOT EXISTS raw;
          CREATE SCHEMA IF NOT EXISTS staging;
          CREATE SCHEMA IF NOT EXISTS warehouse;

          CREATE TABLE IF NOT EXISTS raw.application_train (
            "SK_ID_CURR"          INT,
            "TARGET"              INT,
            "CODE_GENDER"         VARCHAR(10),
            "AMT_INCOME_TOTAL"    FLOAT,
            "AMT_CREDIT"          FLOAT,
            "AMT_ANNUITY"         FLOAT,
            "NAME_EDUCATION_TYPE" VARCHAR(50),
            "OCCUPATION_TYPE"     VARCHAR(50),
            "ORGANIZATION_TYPE"   VARCHAR(50)
          );

          CREATE TABLE IF NOT EXISTS raw.bureau (
            "SK_ID_BUREAU"           INT,
            "SK_ID_CURR"             INT,
            "CREDIT_ACTIVE"          VARCHAR(20),
            "CREDIT_CURRENCY"        VARCHAR(20),
            "DAYS_CREDIT"            INT,
            "CREDIT_DAY_OVERDUE"     INT,
            "DAYS_CREDIT_ENDDATE"    FLOAT,
            "DAYS_ENDDATE_FACT"      FLOAT,
            "AMT_CREDIT_MAX_OVERDUE" FLOAT,
            "CNT_CREDIT_PROLONG"     INT,
            "AMT_CREDIT_SUM"         FLOAT,
            "AMT_CREDIT_SUM_DEBT"    FLOAT,
            "AMT_CREDIT_SUM_LIMIT"   FLOAT,
            "AMT_CREDIT_SUM_OVERDUE" FLOAT,
            "CREDIT_TYPE"            VARCHAR(50),
            "DAYS_CREDIT_UPDATE"     INT,
            "AMT_ANNUITY"            FLOAT
          );

          INSERT INTO raw.application_train VALUES
            (1, 0, 'M',   50000, 100000, 5000, 'Secondary',        'Laborers',    'Business Entity Type 3'),
            (2, 1, 'F',   30000,  80000, 4000, 'Higher education', 'Sales staff', 'School'),
            (3, 0, 'XNA', 45000, 120000, 6000, 'Secondary',        NULL,          'Government');

          INSERT INTO raw.bureau VALUES
            (1001, 1, 'Active', 'currency 1', -365, 0,    0, NULL,  0, 0, 50000, 10000, 40000, 0, 'Consumer credit', -100, 1000),
            (1002, 2, 'Closed', 'currency 2', -730, 0, -365, -300,  0, 1, 30000,     0, 30000, 0, 'Credit card',     -200,  500);
          SQL

      - name: Install dbt packages
        run: dbt deps || true

      - name: Run dbt models
        run: dbt run

      - name: Run dbt tests
        run: dbt test

      - name: Run Great Expectations
        env:
          DB_PASSWORD: password
        run: python great_expectations_suite/run_validations.py
