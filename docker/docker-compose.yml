services:

  # --- PostgreSQL (for Jenkins pipeline) ---
  postgres:
    image: postgres:15
    container_name: de3-postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bankingdb
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - ..:/opt/spark/work-dir
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080

  spark-worker:
    image: spark:3.5.7-java17-python3
    container_name: de3-spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"   # Spark Worker UI
    volumes:
      - ..:/opt/spark/work-dir
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081

  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: de3-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_UID: "50000"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bankingdb
      DB_USER: postgres
      DB_PASSWORD: password
      SPARK_MASTER: spark://spark-master:7077
      RAW_PATH: /opt/airflow/project/data/raw
    volumes:
      - ../dags:/opt/airflow/dags
      - ../logs:/opt/airflow/logs
      - ../plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
      - ../airflow/.dbt:/opt/airflow/.dbt
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com"

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: de3-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_UID: "50000"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bankingdb
      DB_USER: postgres
      DB_PASSWORD: password
      SPARK_MASTER: spark://spark-master:7077
      RAW_PATH: /opt/airflow/project/data/raw
    volumes:
      - ../dags:/opt/airflow/dags
      - ../logs:/opt/airflow/logs
      - ../plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
      - ../airflow/.dbt:/opt/airflow/.dbt
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8082:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: de3-airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_UID: "50000"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bankingdb
      DB_USER: postgres
      DB_PASSWORD: password
      SPARK_MASTER: spark://spark-master:7077
      RAW_PATH: /opt/airflow/project/data/raw
    volumes:
      - ../dags:/opt/airflow/dags
      - ../logs:/opt/airflow/logs
      - ../plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
      - ../airflow/.dbt:/opt/airflow/.dbt
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
