x-airflow-common: &airflow-common
  image: apache/airflow:3.0.0
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@postgres:5432/bankingdb
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__API_SERVER__SECRET_KEY: "loan-dw-secret-key-change-in-prod"
    AIRFLOW__API_SERVER__EXPOSE_CONFIG: "True"
    AIRFLOW__API_SERVER__AUTH_BACKENDS: "airflow.api_fastapi.auth.backend.basic_auth"
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "loan-dw-internal-secret-change-in-prod"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "True"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - jenkins-network

services:

  # --- PostgreSQL ---
  postgres:
    image: postgres:15
    container_name: de3-postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bankingdb
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - jenkins-network

  # --- Spark Master ---
  spark-master:
    image: spark:3.5.7-java17-python3
    container_name: de3-spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    volumes:
      - ..:/opt/spark/work-dir
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
        --host spark-master
        --port 7077
        --webui-port 8080
    networks:
      - jenkins-network

  # --- Spark Worker ---
  spark-worker:
    image: spark:3.5.7-java17-python3
    container_name: de3-spark-worker
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    volumes:
      - ..:/opt/spark/work-dir
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
        spark://spark-master:7077
        --webui-port 8081
    networks:
      - jenkins-network

  # --- Airflow Init (one-shot) ---
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        python3 /opt/airflow/create_admin.py
        echo "Airflow init complete"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs/airflow:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./scripts/create_admin.py:/opt/airflow/create_admin.py:ro
    restart: "no"

  # --- Airflow API Server (Airflow 3: replaces webserver) ---
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: api-server
    ports:
      - "9090:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow Scheduler ---
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow DAG Processor (required in Airflow 3) ---
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

networks:
  jenkins-network:
    name: jenkins-network
    external: true

volumes:
  postgres-data:
